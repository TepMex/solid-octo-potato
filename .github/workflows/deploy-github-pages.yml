name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Project pages are served from https://<user>.github.io/<repo>/, so the Bun bundle must use
      # that base (hashed JS/CSS and fetch/publicAssetUrl paths), not site-root `/`.
      - name: Build
        env:
          BASE_FRONTEND_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
        run: bun run build

      - name: Verify site bundle
        run: |
          test -f dist/index.html
          test -f dist/.nojekyll
          test -f dist/data/tasks.json
          test -f dist/manifest.webmanifest

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
