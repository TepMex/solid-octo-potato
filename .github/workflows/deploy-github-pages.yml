name: Deploy GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build
        env:
          BASE_FRONTEND_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}

      - name: Verify static bundle (disables Jekyll; GitHub Pages needs index.html at branch root)
        run: |
          test -f dist/index.html
          test -f dist/.nojekyll
          ls -la dist/

      - name: Pages uses gh-pages branch
        run: |
          echo 'Set repo **Settings → Pages → Build and deployment**: Source **Deploy from a branch**, branch **gh-pages**, folder **/** (root). Do **not** use **main** or Jekyll will show README-style output when index.html is missing at that source.' >> "$GITHUB_STEP_SUMMARY"

      - name: Push dist to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true
